services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: budget
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://budget:budget@db:5432/budget
      PYTHONPATH: /app
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    env_file: .env
    environment:
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8000}
      VITE_API_BASE: ${VITE_API_BASE:-}
      VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
      VITE_ROUTER_BASENAME: ${VITE_ROUTER_BASENAME:-}
    ports:
      - "${FRONTEND_BIND_IP:-127.0.0.1}:${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  db_data:
